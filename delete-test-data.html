<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>删除测试数据</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .success { color: #0f0; }
        .error { color: #f00; }
        .info { color: #ff0; }
    </style>
</head>
<body>
    <h1>删除测试数据</h1>
    <div id="output"></div>
    <button onclick="deleteTestData()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">确认删除所有测试数据</button>
    
    <script>
        const SUPABASE_URL = 'https://enxfuiaicradjczhfdeb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVueGZ1aWFpY3JhZGpjemhmZGViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTY2MTcsImV4cCI6MjA4ODczMjYxN30.3ruELNP9PzvDr2HrrLboDDHu2rEtdIz2m3TcvnPfHoY';
        
        const output = document.getElementById('output');
        
        async function deleteTestData() {
            output.innerHTML = '<p class="info">正在删除测试数据...</p>';
            
            try {
                // 删除 properties 表
                const propRes = await fetch(`${SUPABASE_URL}/rest/v1/properties`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                output.innerHTML += '<p class="success">✅ properties 表已清空</p>';
                
                // 删除 requests 表
                const reqRes = await fetch(`${SUPABASE_URL}/rest/v1/requests`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                output.innerHTML += '<p class="success">✅ requests 表已清空</p>';
                
                output.innerHTML += '<p class="info">云端数据已删除！请刷新页面。</p>';
                
            } catch (err) {
                output.innerHTML += '<p class="error">❌ 删除失败: ' + err.message + '</p>';
            }
        }
    </script>
</body>
</html>
