    <!-- 登录/注册弹窗 -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAuthModal()">
                <i class="fas fa-times"></i>
            </button>
            
            <!-- 登录表单 -->
            <div id="login-form">
                <h3><i class="fas fa-sign-in-alt"></i> 登录</h3>
                <form onsubmit="event.preventDefault(); doLogin();">
                    <div class="form-group">
                        <label>用户名/手机号</label>
                        <input type="text" id="login-username" placeholder="请输入用户名或手机号" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn-call" style="width: 100%;">登录</button>
                </form>
                <p class="switch-auth">
                    还没有账号？<a href="#" onclick="switchToRegister()">立即注册</a>
                </p>
            </div>
            
            <!-- 注册表单 -->
            <div id="register-form" style="display: none;">
                <h3><i class="fas fa-user-plus"></i> 注册</h3>
                <form onsubmit="event.preventDefault(); doRegister();">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="reg-username" placeholder="请设置用户名（4-20个字符）" required minlength="4" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="reg-phone" placeholder="请输入11位手机号码" required pattern="1[3-9]\d{9}">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="reg-password" placeholder="请设置密码（至少6位）" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="reg-confirm-password" placeholder="请再次输入密码" required>
                    </div>
                    <button type="submit" class="btn-call" style="width: 100%;">注册</button>
                </form>
                <p class="switch-auth">
                    已有账号？<a href="#" onclick="switchToLogin()">立即登录</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const session = localStorage.getItem('yqh_user');
            const userInfo = document.getElementById('user-info');
            const guestInfo = document.getElementById('guest-info');
            const userNameDisplay = document.getElementById('user-name-display');
            const userPhoneDisplay = document.getElementById('user-phone-display');
            
            if (session) {
                const user = JSON.parse(session);
                userInfo.style.display = 'block';
                guestInfo.style.display = 'none';
                if (userNameDisplay) userNameDisplay.textContent = user.username || user.phone;
                if (userPhoneDisplay) userPhoneDisplay.textContent = user.phone || '';
                renderMyListings();
                renderMyWanted();
            } else {
                userInfo.style.display = 'none';
                guestInfo.style.display = 'flex';
            }
        }
        
        function checkUserStatus() {
            const session = localStorage.getItem('yqh_user');
            const userNameDisplay = document.getElementById('user-name-display');
            const logoutLink = document.getElementById('logout-link');
            const loginLink = document.getElementById('login-link');
            const userCenterLink = document.getElementById('user-center-link');
            const userWelcome = document.getElementById('user-welcome');
            
            if (session) {
                const user = JSON.parse(session);
                if (userNameDisplay) userNameDisplay.textContent = user.username || user.phone;
                if (logoutLink) logoutLink.style.display = 'inline-flex';
                if (loginLink) loginLink.style.display = 'none';
                if (userCenterLink) userCenterLink.style.display = 'inline-flex';
                if (userWelcome) userWelcome.textContent = '欢迎回来，' + (user.username || user.phone);
            } else {
                if (logoutLink) logoutLink.style.display = 'none';
                if (loginLink) loginLink.style.display = 'inline-flex';
                if (userWelcome) userWelcome.textContent = '登录后查看您的个人信息';
            }
        }
        
        function formatPrice(price) {
            if (!price) return '面议';
            if (price === '0') return '面议';
            if (typeof price === 'string' && price.includes('-')) {
                return price.replace('-', '-') + '元';
            }
            return price.toLocaleString('zh-CN');
        }
        
        function formatDate(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }
        
        async function getListings() {
            const localData = JSON.parse(localStorage.getItem('yqh_listings') || '[]');
            
            try {
                const response = await fetch('https://tysrmpssxrdjgrubkltj.supabase.co/rest/v1/properties?select=*', {
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc'
                    }
                });
                const cloudData = await response.json();
                
                const allData = [...cloudData];
                localData.forEach(local => {
                    if (!allData.find(d => d.id === local.id)) {
                        allData.push(local);
                    }
                });
                return allData;
            } catch (e) {
                return localData;
            }
        }

            const localData = JSON.parse(localStorage.getItem('yqh_rent_wanted') || '[]');
            
            try {

                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc'

                });
                const cloudData = await response.json();
                
                const allData = [...cloudData];
                localData.forEach(local => {
                    if (!allData.find(d => d.id === local.id)) {

                return localData;

        function getUsers() {
            const data = localStorage.getItem('yqh_users');
            return data ? JSON.parse(data) : [];
        }

        async function renderMyListings() {
            const session = localStorage.getItem('yqh_user');
            if (!session) {
                document.getElementById('my-listings').innerHTML = '<div class="empty-state"><p>请先登录</p></div>';
                return;
            }
            
            const user = JSON.parse(session);
            const allListings = await getListings();
            
            if (allListings.length === 0) {
                document.getElementById('my-listings').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-building"></i>
                        <h4>暂无房源数据</h4>
                        <p>请先发布房源</p>
                    </div>
                `;
                return;
            }
            
            const listings = allListings.filter(l => l.user_id === user.id || !l.user_id);
                        
            if (listings.length === 0) {
                document.getElementById('my-listings').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-building"></i>
                        <h4>暂无发布的房源</h4>
                        <p>你发布的房源user_id与当前登录用户不匹配</p>
                        <a href="publish.html" class="btn-call" style="display: inline-flex; margin-top: 1rem;">发布房源</a>
                    </div>
                `;
                return;
            }
            
            const container = document.getElementById('my-listings');
            
            container.innerHTML = listings.map(item => `
                <div class="my-listings-card">
                    <div class="my-listings-info">
                        <h4><a href="detail.html?id=${item.id}" target="_blank" style="color: var(--gray-800);">${item.title}</a></h4>
                        <p>${item.region} · ${item.area}㎡ · ¥${formatPrice(item.price)}/月 · ${formatDate(item.timestamp)}</p>
                    </div>
                    <div class="my-listings-actions">
                        <span class="status-badge status-${item.status}">${item.status === 'approved' ? '已发布' : item.status === 'pending' ? '审核中' : '已拒绝'}</span>
                        <button class="btn-delete" onclick="deleteMyListing('${item.id}')">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function renderMyWanted() {
            const session = localStorage.getItem('yqh_user');
            if (!session) return;
            
            const user = JSON.parse(session);
            const wanted = (await getWantedList()).filter(w => w.user_id === user.id || !w.user_id);
            const container = document.getElementById('my-wanted');
            
            if (wanted.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h4>暂无发布的求租信息</h4>
                        <a href="rent-wanted-publish.html" class="btn-call" style="display: inline-flex; margin-top: 1rem;">发布求租</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = wanted.map(item => `
                <div class="my-listings-card">
                    <div class="my-listings-info">
                        <h4><a href="rent-wanted-detail.html?id=${item.id}" target="_blank" style="color: var(--gray-800);">${item.title}</a></h4>
                        <p>${item.region} · ${item.area}㎡ · ¥${formatPrice(item.budget)}/月 · ${formatDate(item.timestamp)}</p>
                    </div>
                    <div class="my-listings-actions">
                        <span class="status-badge status-${item.status}">${item.status === 'approved' ? '已发布' : item.status === 'pending' ? '审核中' : '已拒绝'}</span>
                        <button class="btn-delete" onclick="deleteMyWanted('${item.id}')">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteMyListing(id) {
            const session = localStorage.getItem('yqh_user');
            if (!session) {
                alert('请先登录');
                return;
            }
            const user = JSON.parse(session);
            
            const listings = await getListings();
            const listing = listings.find(l => l.id === id);
            
            if (!listing) {
                alert('房源不存在');
                return;
            }
            
            if (listing.user_id && listing.user_id !== user.id) {
                alert('您只能删除自己发布的房源');
                return;
            }
            
            if (confirm('确定删除此房源吗？')) {
                try {
                    await fetch('https://tysrmpssxrdjgrubkltj.supabase.co/rest/v1/properties?id=eq.' + id, {
                        method: 'DELETE',
                        headers: {
                            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc'
                        }
                    });
                } catch (e) {}
                
                let list = JSON.parse(localStorage.getItem('yqh_listings') || '[]');
                list = list.filter(l => l.id !== id);
                localStorage.setItem('yqh_listings', JSON.stringify(list));
                
                showToast('删除成功');
                renderMyListings();
            }
        }

        async function deleteMyWanted(id) {
            const session = localStorage.getItem('yqh_user');
            if (!session) {
                alert('请先登录');
                return;
            }
            const user = JSON.parse(session);
            
            const wanted = await getWantedList();
            const item = wanted.find(w => w.id === id);
            
            if (!item) {
                alert('求租信息不存在');
                return;
            }
            
            if (item.user_id && item.user_id !== user.id) {
                alert('您只能删除自己发布的求租信息');
                return;
            }
            
            if (confirm('确定删除此求租信息吗？')) {
                try {
                    await fetch('https://tysrmpssxrdjgrubkltj.supabase.co/rest/v1/requests?id=eq.' + id, {
                        method: 'DELETE',
                        headers: {
                            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc'
                        }
                    });
                } catch (e) {}
                
                let list = JSON.parse(localStorage.getItem('yqh_rent_wanted') || '[]');
                list = list.filter(w => w.id !== id);
                localStorage.setItem('yqh_rent_wanted', JSON.stringify(list));
                
                showToast('删除成功');
                renderMyWanted();
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('yqh_user');
                window.location.reload();
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            initAuth();
            checkUserStatus();
            renderMyListings();
            renderMyWanted();
            
            const menuBtn = document.getElementById('mobile-menu-btn');
            const closeBtn = document.getElementById('mobile-nav-close');
            const mobileNav = document.getElementById('mobile-nav');
            const overlay = document.getElementById('mobile-nav-overlay');
            
            if (menuBtn && mobileNav) {
                menuBtn.addEventListener('click', () => {
                    mobileNav.classList.add('active');
                    overlay.classList.add('active');
                });
            }
            
            if (closeBtn && mobileNav) {
                closeBtn.addEventListener('click', () => {
                    mobileNav.classList.remove('active');
                    overlay.classList.remove('active');
                });
            }
            
            if (overlay && mobileNav) {
                overlay.addEventListener('click', () => {
                    mobileNav.classList.remove('active');
                    overlay.classList.remove('active');
                });
            }
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(this.dataset.tab + '-tab').classList.add('active');
                });
            });
            
            document.getElementById('logout-btn').addEventListener('click', function(e) {
                e.preventDefault();
                logout();
            });
        });
    </script>
</body>
</html>
