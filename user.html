                    </div>
                    <button type="submit" style="width:100%;padding:0.75rem;background:#4F46E5;color:white;border:none;border-radius:8px;cursor:pointer;font-size:1rem;">登录</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        function checkLogin() {
            const session = localStorage.getItem('yqh_user');
            const userInfo = document.getElementById('user-info');
            const guestInfo = document.getElementById('guest-info');
            const userNameDisplay = document.getElementById('user-name-display');
            const userPhoneDisplay = document.getElementById('user-phone-display');
            
            if (session) {
                const user = JSON.parse(session);
                userInfo.style.display = 'block';
                guestInfo.style.display = 'none';
                if (userNameDisplay) userNameDisplay.textContent = user.username || user.phone;
                if (userPhoneDisplay) userPhoneDisplay.textContent = user.phone || '';
                renderMyListings();
                renderMyWanted();
            } else {
                userInfo.style.display = 'none';
                guestInfo.style.display = 'flex';
            }
        }
        
        function checkUserStatus() {
            const session = localStorage.getItem('yqh_user');
            const userNameDisplay = document.getElementById('user-name-display');
            const logoutLink = document.getElementById('logout-link');
            const loginLink = document.getElementById('login-link');
            const userCenterLink = document.getElementById('user-center-link');
            const userWelcome = document.getElementById('user-welcome');
            
            if (session) {
                const user = JSON.parse(session);
                if (userNameDisplay) userNameDisplay.textContent = user.username || user.phone;
                if (logoutLink) logoutLink.style.display = 'inline-flex';
                if (loginLink) loginLink.style.display = 'none';
                if (userCenterLink) userCenterLink.style.display = 'inline-flex';
                if (userWelcome) userWelcome.textContent = '欢迎回来，' + (user.username || user.phone);
            } else {
                if (logoutLink) logoutLink.style.display = 'none';
                if (loginLink) loginLink.style.display = 'inline-flex';
                if (userWelcome) userWelcome.textContent = '登录后查看您的个人信息';
            }
        }
        
        function formatPrice(price) {
            if (!price) return '面议';
            if (price === '0') return '面议';
            if (typeof price === 'string' && price.includes('-')) {
                return price.replace('-', '-') + '元';
            }
            return price.toLocaleString('zh-CN');
        }
        
        function formatDate(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }
        
        async function getListings() {
            const localData = JSON.parse(localStorage.getItem('yqh_listings') || '[]');
            
            try {
                const response = await fetch('https://tysrmpssxrdjgrubkltj.supabase.co/rest/v1/properties?select=*', {
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc'
                    }
                });
                const cloudData = await response.json();
                
                const allData = [...cloudData];
                localData.forEach(local => {
                    if (!allData.find(d => d.id === local.id)) {
                        allData.push(local);
                    }
                });
                return allData;
            } catch (e) {
                return localData;
            }
        }

        async function getWantedList() {
            const localData = JSON.parse(localStorage.getItem('yqh_rent_wanted') || '[]');
            
            try {
                const response = await fetch('https://tysrmpssxrdjgrubkltj.supabase.co/rest/v1/requests?select=*', {
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5c3JtcHNzeHJkamdydWJrbHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzUxNzAsImV4cCI6MjA4OTY1MTE3MH0.jMnnFGpwzdrd8caQlyMoSvmlOTNJYPjvLUq1l86zqOc'
                    }
                });
                const cloudData = await response.json();
                
                const allData = [...cloudData];
                localData.forEach(local => {
                    if (!allData.find(d => d.id === local.id)) {
                        allData.push(local);
                    }
                });
                return allData;
            } catch (e) {
                return localData;
            }
        }

        function getUsers() {
            const data = localStorage.getItem('yqh_users');
            return data ? JSON.parse(data) : [];
        }

        async function renderMyListings() {
            const session = localStorage.getItem('yqh_user');
            if (!session) {
                document.getElementById('my-listings').innerHTML = '<div class="empty-state"><p>请先登录</p></div>';
                return;
            }
            
            const user = JSON.parse(session);
            const allListings = await getListings();
            
            if (allListings.length === 0) {
                document.getElementById('my-listings').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-building"></i>
                        <h4>暂无房源数据</h4>
                        <p>请先发布房源</p>
                    </div>
                `;
                return;
            }
            
            const listings = allListings.filter(l => l.user_id === user.id || !l.user_id);
                        
            if (listings.length === 0) {
                document.getElementById('my-listings').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-building"></i>
                        <h4>暂无发布的房源</h4>
                        <p>你发布的房源user_id与当前登录用户不匹配</p>
                        <a href="publish.html" class="btn-call" style="display: inline-flex; margin-top: 1rem;">发布房源</a>
                    </div>
                `;
                return;
            }
            
            const container = document.getElementById('my-listings');
            
            container.innerHTML = listings.map(item => `
                <div class="my-listings-card" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; background: #f9f9f9; border-radius: 8px; margin-bottom: 0.75rem; border: 1px solid #eee;">
                    <div class="my-listings-info" style="flex: 1;">
                        <h4 style="margin-bottom: 0.5rem;"><a href="detail.html?id=${item.id}" target="_blank" style="color: #333; text-decoration: none;">${item.title}</a></h4>
                        <p style="color: #666; font-size: 0.85rem; margin: 0;">${item.region} · ${item.area}㎡ · ¥${formatPrice(item.price)}/月</p>
                        <p style="color: #999; font-size: 0.8rem; margin: 0.25rem 0 0 0;">${formatDate(item.timestamp)}</p>
                    </div>
                    <div class="my-listings-actions" style="display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end;">
                        <span class="status-badge status-${item.status}" style="padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; background: ${item.status === 'approved' ? '#d4edda' : '#fff3cd'}; color: ${item.status === 'approved' ? '#155724' : '#856404'};">${item.status === 'approved' ? '已发布' : item.status === 'pending' ? '审核中' : '已拒绝'}</span>
                        <button class="btn-delete" onclick="deleteMyListing('${item.id}')" style="padding: 0.375rem 0.75rem; background: #fee; color: #c00; border: 1px solid #fcc; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function renderMyWanted() {
            const session = localStorage.getItem('yqh_user');
            if (!session) return;
            
            const user = JSON.parse(session);
            const wanted = (await getWantedList()).filter(w => w.user_id === user.id || !w.user_id);
            const container = document.getElementById('my-wanted');
            
            if (wanted.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h4>暂无发布的求租信息</h4>
                        <a href="rent-wanted-publish.html" class="btn-call" style="display: inline-flex; margin-top: 1rem;">发布求租</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = wanted.map(item => `
                <div class="my-listings-card" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; background: #f9f9f9; border-radius: 8px; margin-bottom: 0.75rem; border: 1px solid #eee;">
                    <div class="my-listings-info" style="flex: 1;">
                        <h4 style="margin-bottom: 0.5rem;"><a href="rent-wanted-detail.html?id=${item.id}" target="_blank" style="color: #333; text-decoration: none;">${item.title}</a></h4>

                    </div>
                </div>
            `).join('');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        
        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            initAuth();
            checkUserStatus();
            renderMyListings();
            renderMyWanted();
            
            // 未登录用户的立即登录按钮
            const guestLoginBtn = document.getElementById('guest-login-btn');
            if (guestLoginBtn) {
                guestLoginBtn.onclick = function() {
                    if (typeof showAuthModal === 'function') {
                        showAuthModal();
                    } else if (typeof showLoginModal === 'function') {
                        showLoginModal();
                    } else {
                        alert('登录功能加载中，请稍候再试');
                    }
                };
            }
            
            const menuBtn = document.getElementById('mobile-menu-btn');
            const closeBtn = document.getElementById('mobile-nav-close');
            const mobileNav = document.getElementById('mobile-nav');
            const overlay = document.getElementById('mobile-nav-overlay');
            
            if (menuBtn && mobileNav) {
                menuBtn.addEventListener('click', () => {
                    mobileNav.classList.add('active');
                    overlay.classList.add('active');
                });
            }
            
            if (closeBtn && mobileNav) {
                closeBtn.addEventListener('click', () => {
                    mobileNav.classList.remove('active');
                    overlay.classList.remove('active');
                });
            }
            
            if (overlay && mobileNav) {
                overlay.addEventListener('click', () => {
                    mobileNav.classList.remove('active');
                    overlay.classList.remove('active');
                });
            }
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(this.dataset.tab + '-tab').classList.add('active');
                });
            });
            
            document.getElementById('logout-btn').addEventListener('click', function(e) {
                e.preventDefault();
                logout();
            });
        });
