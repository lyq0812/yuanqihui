<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库测试 - 园企汇</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>数据库连接测试</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        async function testConnection() {
            results.innerHTML = '<p>正在连接Supabase...</p>';
            
            try {
                const supabase = window.supabase.createClient(
                    'https://enxfuiaicradjczhfdeb.supabase.co',
                    'sb_publishable_5iLWKyQVe1pg6tyOsvtwkw_8_pOqI-I'
                );
                
                results.innerHTML += '<p style="color:green">Supabase客户端创建成功</p>';
                
                // 测试查询properties表
                results.innerHTML += '<p>正在查询properties表...</p>';
                const { data: properties, error: propError } = await supabase
                    .from('properties')
                    .select('*')
                    .eq('status', 'approved');
                
                if (propError) {
                    results.innerHTML += '<p style="color:red">查询properties失败: ' + JSON.stringify(propError) + '</p>';
                } else {
                    results.innerHTML += '<p style="color:green">properties表查询成功，共 ' + (properties?.length || 0) + ' 条数据</p>';
                    results.innerHTML += '<pre>' + JSON.stringify(properties, null, 2) + '</pre>';
                }
                
                // 测试查询requests表
                results.innerHTML += '<p>正在查询requests表...</p>';
                const { data: requests, error: reqError } = await supabase
                    .from('requests')
                    .select('*')
                    .eq('status', 'approved');
                
                if (reqError) {
                    results.innerHTML += '<p style="color:red">查询requests失败: ' + JSON.stringify(reqError) + '</p>';
                } else {
                    results.innerHTML += '<p style="color:green">requests表查询成功，共 ' + (requests?.length || 0) + ' 条数据</p>';
                    results.innerHTML += '<pre>' + JSON.stringify(requests, null, 2) + '</pre>';
                }
                
            } catch (err) {
                results.innerHTML += '<p style="color:red">发生错误: ' + err.message + '</p>';
                results.innerHTML += '<pre>' + err.stack + '</pre>';
            }
        }
        
        testConnection();
    </script>
</body>
</html>
