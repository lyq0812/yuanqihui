<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>清除本地数据</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>清除本地数据</h1>
    <p>此操作将清除浏览器中的登录信息和缓存数据</p>
    <button onclick="clearData()" style="background: #ef4444; color: white; border: none;">确认清除</button>
    <p id="result"></p>
    
    <script>
        function clearData() {
            localStorage.removeItem('yqh_user');
            localStorage.removeItem('yqh_users');
            localStorage.removeItem('yqh_listings');
            localStorage.removeItem('yqh_rent_wanted');
            localStorage.removeItem('yqh_favorites');
            localStorage.removeItem('cachedListings');
            
            document.getElementById('result').innerHTML = '<p class="success">✅ 清除成功！请重新刷新页面。</p>';
        }
    </script>
</body>
</html>
