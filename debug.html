<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库调试 - 园企汇</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .success { color: #0f0; }
        .error { color: #f00; }
        .warning { color: #fa0; }
        .info { color: #ff0; }
        pre { background: #333; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>数据库连接测试</h1>
    <div id="output"></div>
    
    <script>
        const SUPABASE_URL = 'https://enxfuiaicradjczhfdeb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVueGZ1aWFpY3JhZGpjemhmZGViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTY2MTcsImV4cCI6MjA4ODczMjYxN30.3ruELNP9PzvDr2HrrLboDDHu2rEtdIz2m3TcvnPfHoY';
        
        const output = document.getElementById('output');
        
        async function testFetch() {
            output.innerHTML = '<p class="info">开始测试数据库连接...</p>';
            
            try {
                output.innerHTML += '<p class="info">正在查询 properties 表 (status=approved)...</p>';
                const propResponse = await fetch(`${SUPABASE_URL}/rest/v1/properties?select=id,title,status,region&status=eq.approved`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const propData = await propResponse.json();
                
                if (!propResponse.ok) {
                    output.innerHTML += `<p class="error">❌ properties 表查询失败!</p>`;
                    output.innerHTML += `<p class="error">状态码: ${propResponse.status}</p>`;
                    output.innerHTML += `<p class="error">错误信息: ${JSON.stringify(propData)}</p>`;
                } else {
                    output.innerHTML += `<p class="success">✅ properties 表查询成功!</p>`;
                    output.innerHTML += `<p class="success">状态码: ${propResponse.status}</p>`;
                    output.innerHTML += `<p class="success">数据数量: ${propData.length || 0}</p>`;
                    if (propData.length > 0) {
                        output.innerHTML += `<p class="info">最新数据状态:</p>`;
                        output.innerHTML += `<pre>${JSON.stringify(propData.slice(0, 3), null, 2)}</pre>`;
                    }
                }
                
                output.innerHTML += '<hr style="border-color:#333">';
                
                output.innerHTML += '<p class="info">正在查询 requests 表 (status=approved)...</p>';
                const reqResponse = await fetch(`${SUPABASE_URL}/rest/v1/requests?select=id,title,status&status=eq.approved`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const reqData = await reqResponse.json();
                
                if (!reqResponse.ok) {
                    output.innerHTML += `<p class="error">❌ requests 表查询失败!</p>`;
                    output.innerHTML += `<p class="error">状态码: ${reqResponse.status}</p>`;
                    output.innerHTML += `<p class="error">错误信息: ${JSON.stringify(reqData)}</p>`;
                } else {
                    output.innerHTML += `<p class="success">✅ requests 表查询成功!</p>`;
                    output.innerHTML += `<p class="success">状态码: ${reqResponse.status}</p>`;
                    output.innerHTML += `<p class="success">数据数量: ${reqData.length || 0}</p>`;
                    if (reqData.length > 0) {
                        output.innerHTML += `<p class="info">最新数据状态:</p>`;
                        output.innerHTML += `<pre>${JSON.stringify(reqData.slice(0, 3), null, 2)}</pre>`;
                    } else {
                        output.innerHTML += `<p class="warning">⚠️ 数据库中没有任何 approved 状态的 requests 数据!</p>`;
                        output.innerHTML += `<p class="info">尝试查询所有状态的 requests 数据...</p>`;
                        
                        const allReqResponse = await fetch(`${SUPABASE_URL}/rest/v1/requests?select=id,title,status`, {
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`
                            }
                        });
                        const allReqData = await allReqResponse.json();
                        if (allReqData.length > 0) {
                            output.innerHTML += `<p class="warning">找到 ${allReqData.length} 条数据，状态分布:</p>`;
                            const statusCounts = {};
                            allReqData.forEach(item => {
                                statusCounts[item.status] = (statusCounts[item.status] || 0) + 1;
                            });
                            output.innerHTML += `<pre>${JSON.stringify(statusCounts, null, 2)}</pre>`;
                            output.innerHTML += `<pre>${JSON.stringify(allReqData.slice(0, 5), null, 2)}</pre>`;
                        }
                    }
                }
                
            } catch (err) {
                output.innerHTML += `<p class="error">❌ 请求异常: ${err.message}</p>`;
            }
        }
        
        testFetch();
    </script>
</body>
</html>
